name: Publish npm canary for PR branches

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-canary-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  publish-canary:
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout PR head commit
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Ensure stable base version is not already released
        run: pnpm --silent run release:assert-unpublished-base

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Compute canary version
        id: version
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          VERSION="$(pnpm --silent run release:compute-prerelease -- --preid "canary-pr-$PR_NUMBER" --run-id "$GITHUB_RUN_ID" --run-attempt "$GITHUB_RUN_ATTEMPT" --sha "${{ github.event.pull_request.head.sha }}")"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Computed canary version: $VERSION"

      - name: Stage publishable package
        id: stage
        run: |
          PACKAGE_DIR="$RUNNER_TEMP/miniprogram-minium-cli-canary"
          pnpm --silent run release:stage-package -- --version "${{ steps.version.outputs.version }}" --output-dir "$PACKAGE_DIR"
          echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"

      - name: Publish canary release to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN:-}" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          if ! npm publish "${{ steps.stage.outputs.package_dir }}" --tag canary --provenance --access public; then
            echo "::error::npm canary publish failed. Configure npm trusted publishing for pull_request workflows or provide NPM_TOKEN as a temporary fallback."
            exit 1
          fi

      - name: Write workflow summary
        run: |
          {
            echo "## npm canary published"
            echo
            echo "- PR: \`#${{ github.event.pull_request.number }}\`"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Dist-tag: \`canary\`"
            echo "- Install: \`pnpm add -g miniprogram-minium-cli@${{ steps.version.outputs.version }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
