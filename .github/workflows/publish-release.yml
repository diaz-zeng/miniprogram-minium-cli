name: Publish npm stable release from main

on:
  push:
    branches:
      - main

permissions:
  contents: write
  id-token: write
  pull-requests: read

concurrency:
  group: npm-stable-main
  cancel-in-progress: false

jobs:
  publish-release:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Resolve merged release pull request
        id: release_pr
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner,
              repo,
              commit_sha: context.sha,
            });
            const pullRequest = response.data.find((pr) => pr.base.ref === "main" && pr.merged_at);
            if (!pullRequest) {
              core.setFailed(`Commit ${context.sha} is not associated with a merged release PR into main.`);
              return;
            }
            core.setOutput("number", String(pullRequest.number));
            core.setOutput("head_ref", pullRequest.head.ref);

      - name: Validate merged release branch and version
        id: release_line
        run: pnpm --silent run release:assert-release-branch -- --branch "${{ steps.release_pr.outputs.head_ref }}" >> "$GITHUB_OUTPUT"

      - name: Ensure stable release version is unpublished
        run: pnpm --silent run release:assert-stable-unpublished

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Ensure tag and release do not already exist
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.release_line.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const tag = `v${process.env.RELEASE_VERSION}`;
            try {
              await github.rest.git.getRef({ owner, repo, ref: `tags/${tag}` });
              core.setFailed(`Tag ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }
            try {
              await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              core.setFailed(`GitHub Release for ${tag} already exists.`);
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

      - name: Extract changelog section
        id: changelog
        env:
          RELEASE_VERSION: ${{ steps.release_line.outputs.version }}
        run: |
          CHANGELOG_BODY="$RUNNER_TEMP/release-changelog.md"
          pnpm --silent run release:extract-changelog -- --version "$RELEASE_VERSION" > "$CHANGELOG_BODY"
          echo "path=$CHANGELOG_BODY" >> "$GITHUB_OUTPUT"

      - name: Compute stable version
        id: version
        run: echo "version=${{ steps.release_line.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Stage publishable package
        id: stage
        run: |
          PACKAGE_DIR="$RUNNER_TEMP/miniprogram-minium-cli-release"
          pnpm --silent run release:stage-package -- --version "${{ steps.version.outputs.version }}" --output-dir "$PACKAGE_DIR"
          echo "package_dir=$PACKAGE_DIR" >> "$GITHUB_OUTPUT"

      - name: Publish stable release to npm
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          if [ -n "${NPM_TOKEN:-}" ]; then
            export NODE_AUTH_TOKEN="$NPM_TOKEN"
          fi
          if ! npm publish "${{ steps.stage.outputs.package_dir }}" --provenance --access public; then
            echo "::error::npm release publish failed. Check release branch validation and configure npm trusted publishing or NPM_TOKEN."
            exit 1
          fi

      - name: Generate GitHub release notes
        id: generated_notes
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const response = await github.rest.repos.generateReleaseNotes({
              owner,
              repo,
              tag_name: `v${process.env.RELEASE_VERSION}`,
              target_commitish: context.sha,
            });
            const fs = require("node:fs");
            const path = `${process.env.RUNNER_TEMP}/generated-release-notes.md`;
            fs.writeFileSync(path, response.data.body ?? "", "utf8");
            core.setOutput("path", path);

      - name: Compose release body
        id: release_body
        run: |
          BODY_PATH="$RUNNER_TEMP/release-body.md"
          {
            echo "## Changelog"
            echo
            cat "${{ steps.changelog.outputs.path }}"
            echo
            echo "---"
            echo
            echo "## Auto-generated Notes"
            echo
            cat "${{ steps.generated_notes.outputs.path }}"
          } > "$BODY_PATH"
          echo "path=$BODY_PATH" >> "$GITHUB_OUTPUT"

      - name: Create tag and GitHub Release
        uses: actions/github-script@v7
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_KIND: ${{ steps.release_line.outputs.kind }}
          RELEASE_BODY_PATH: ${{ steps.release_body.outputs.path }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const fs = require("node:fs");
            const body = fs.readFileSync(process.env.RELEASE_BODY_PATH, "utf8");
            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: `v${process.env.RELEASE_VERSION}`,
              target_commitish: context.sha,
              name: `v${process.env.RELEASE_VERSION}`,
              body,
              draft: false,
              prerelease: false,
            });

      - name: Write workflow summary
        run: |
          {
            echo "## npm stable release published"
            echo
            echo "- PR: \`#${{ steps.release_pr.outputs.number }}\`"
            echo "- Release kind: \`${{ steps.release_line.outputs.kind }}\`"
            echo "- Version: \`${{ steps.version.outputs.version }}\`"
            echo "- Dist-tag: \`latest\`"
            echo "- Install: \`pnpm add -g miniprogram-minium-cli\`"
          } >> "$GITHUB_STEP_SUMMARY"
